<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trace</title>
<style>
  /* ─────────────────────────────────────────────────────────────────
     Trace — tracing-paper UI.
     The card is a sheet of translucent butter paper laid over the desk:
     frosted, faintly non-photo-blue, a whisper of drafting grid beneath.
     Status lives ONLY in the dot before a line — never in the text colour.
     The one accent is blueprint-blue, reserved for things you can act on
     (a citation, a link, the send key). Everything else is graphite ink.
     ───────────────────────────────────────────────────────────────── */
  :root{
    /* paper + ink */
    --ink:#182233;            /* graphite — all primary text            */
    --muted:#5b6b80;          /* pencil grey — secondary text           */
    --line:rgba(24,34,51,.10);/* hairline rule                          */
    --line-soft:rgba(24,34,51,.06);
    /* the one accent — blueprint blue, for actionable things only */
    --trace:#2f57e6;
    --trace-soft:rgba(47,87,230,.16);
    /* status — expressed only as dots */
    --ok:#1a9d6e;             /* valid / locked                         */
    --no:#e0435a;             /* proposed · rejected                    */
    --sup:#d19a2e;            /* superseded                             */
    /* non-photo blue — the tint that makes it read as tracing paper */
    --npb:150,205,225;
    --radius:20px;
    --spring:cubic-bezier(.32,.72,0,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:transparent;height:100%;overflow:hidden;
    -webkit-user-select:none;user-select:none;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:var(--ink);
  }
  .mono{font-family:ui-monospace,"SF Mono",SFMono-Regular,"Roboto Mono",Menlo,monospace;
    font-size:.86em;letter-spacing:-.01em}

  .stage{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;align-items:flex-end;gap:14px}

  /* ── the bubble: a drop of blueprint ink under frosted glass ────────── */
  .bubble{
    width:56px;height:56px;border-radius:50%;cursor:pointer;position:relative;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(120% 120% at 32% 26%,rgba(255,255,255,.85),rgba(var(--npb),.5) 42%,rgba(47,87,230,.16) 100%);
    -webkit-backdrop-filter:blur(14px) saturate(1.3);backdrop-filter:blur(14px) saturate(1.3);
    border:1px solid rgba(255,255,255,.7);
    box-shadow:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 -6px 18px rgba(47,87,230,.10) inset,
      0 12px 30px rgba(24,34,51,.22);
    animation:breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 -6px 18px rgba(47,87,230,.10) inset,0 0 0 0 var(--trace-soft),0 12px 30px rgba(24,34,51,.22)}
    50%{transform:scale(1.045);box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 -6px 18px rgba(47,87,230,.10) inset,0 0 0 12px rgba(47,87,230,0),0 14px 34px rgba(24,34,51,.26)}
  }
  .bubble svg{width:27px;height:27px;color:var(--trace);filter:drop-shadow(0 1px 1px rgba(47,87,230,.18))}
  .badge{position:absolute;top:-2px;right:-2px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
    background:var(--trace);color:#fff;font-size:11px;font-weight:600;
    display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.85);
    box-shadow:0 2px 6px rgba(47,87,230,.4)}

  /* ── the sheet of tracing paper ────────────────────────────────────── */
  .card{
    width:330px;position:relative;border-radius:var(--radius);overflow:hidden;
    background:linear-gradient(180deg,rgba(253,254,255,.82),rgba(248,251,253,.78));
    -webkit-backdrop-filter:blur(30px) saturate(1.4);backdrop-filter:blur(30px) saturate(1.4);
    border:1px solid rgba(255,255,255,.6);
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 0 0 1px var(--line-soft),
      0 30px 60px -12px rgba(24,34,51,.32);
    transition:opacity .32s var(--spring),transform .32s var(--spring);
  }
  /* the drafting grid + non-photo-blue wash, behind the content */
  .card::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
    background:
      linear-gradient(rgba(47,87,230,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(47,87,230,.035) 1px,transparent 1px),
      radial-gradient(140% 90% at 80% -10%,rgba(var(--npb),.16),transparent 60%);
    background-size:22px 22px,22px 22px,100% 100%;
  }
  .card>*{position:relative;z-index:1}
  .hidden{opacity:0;transform:scale(.94) translateY(10px);pointer-events:none;position:absolute;bottom:70px;right:0}

  /* header */
  .chead{display:flex;align-items:center;gap:9px;padding:14px 16px 13px;border-bottom:1px solid var(--line-soft)}
  .live{width:8px;height:8px;border-radius:50%;background:var(--ok);position:relative;flex:none}
  .live::after{content:"";position:absolute;inset:-3px;border-radius:50%;
    box-shadow:0 0 0 0 rgba(26,157,110,.4);animation:pulse 2.8s ease-out infinite}
  @keyframes pulse{to{box-shadow:0 0 0 6px rgba(26,157,110,0)}}
  .chead .t{font-weight:650;font-size:15px;letter-spacing:-.02em}
  .chead .s{font-size:11.5px;color:var(--muted);font-weight:450;letter-spacing:-.01em}
  .chead .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;opacity:.6;transition:opacity .15s}
  .chead .x:hover{opacity:1}

  /* nudge body */
  .ntitle{padding:15px 16px 4px;font-size:12.5px;color:var(--muted);font-weight:450;letter-spacing:-.01em}
  .ntitle b{color:var(--ink);font-weight:600}
  .rows{padding:8px 16px 4px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:11px;align-items:flex-start;font-size:13px;line-height:1.4}
  .rdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.5)}
  .g{background:var(--ok)}.r{background:var(--no)}.a{background:var(--sup)}
  .row b{font-weight:600}
  .row .k{color:var(--muted);font-weight:450}
  .actions{display:flex;gap:9px;padding:15px 16px 16px}
  .btn{flex:1;font:inherit;font-size:12.5px;font-weight:550;letter-spacing:-.01em;padding:9px;border-radius:11px;
    cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.5);color:var(--ink);
    transition:background .15s,border-color .15s}
  .btn:hover{background:rgba(255,255,255,.8)}
  .btn.primary{background:var(--trace);border-color:var(--trace);color:#fff;box-shadow:0 4px 12px rgba(47,87,230,.28)}
  .btn.primary:hover{background:#2a4ed3}
  .allow{font-size:10.5px;color:var(--muted);padding:9px 16px;border-top:1px solid var(--line-soft);
    background:rgba(var(--npb),.06);font-weight:450;letter-spacing:-.005em}
  .allow b{color:#334155;font-weight:600}

  /* chat body */
  .projbar{padding:10px 14px 2px}
  .projbar select{width:100%;font:inherit;font-size:12px;font-weight:500;color:var(--muted);
    border:1px solid var(--line);border-radius:10px;padding:7px 10px;
    background:rgba(255,255,255,.55);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 15px) 15px,calc(100% - 10px) 15px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .msgs{padding:14px;display:flex;flex-direction:column;gap:10px;max-height:300px;overflow:auto;scroll-behavior:smooth}
  .msgs::-webkit-scrollbar{width:0}
  .msg{max-width:85%;font-size:13px;line-height:1.5;padding:10px 13px;border-radius:15px;letter-spacing:-.006em;
    overflow-wrap:anywhere;animation:rise .3s var(--spring) both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .from-t{align-self:flex-start;background:rgba(255,255,255,.7);border:1px solid var(--line-soft);
    border-bottom-left-radius:5px;color:var(--ink);box-shadow:0 1px 0 rgba(255,255,255,.6) inset}
  .from-u{align-self:flex-end;background:var(--trace);color:#fff;border-bottom-right-radius:5px;
    box-shadow:0 4px 12px rgba(47,87,230,.22)}
  /* citations + links: the accent, and the ONLY coloured text — because they
     are the actionable references, not a status signal */
  .cite{color:var(--trace);font-weight:600;text-decoration:none;border-bottom:1px solid var(--trace-soft)}
  .cite.mono{white-space:nowrap}   /* a decision id never splits across lines */
  .from-u .cite{color:#fff;border-bottom-color:rgba(255,255,255,.5)}
  .inbar{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--line-soft)}
  .inbar input{flex:1;font:inherit;font-size:13px;color:var(--ink);border:1px solid var(--line);
    border-radius:11px;padding:9px 12px;outline:none;background:rgba(255,255,255,.6);transition:border-color .15s,box-shadow .15s}
  .inbar input::placeholder{color:var(--muted)}
  .inbar input:focus{border-color:var(--trace);box-shadow:0 0 0 3px var(--trace-soft)}
  .send{width:38px;border:none;border-radius:11px;background:var(--trace);color:#fff;cursor:pointer;font-size:15px;
    box-shadow:0 4px 12px rgba(47,87,230,.28);transition:background .15s}
  .send:hover{background:#2a4ed3}
</style>
</head>
<body>
  <div class="stage">
    <div class="card hidden" id="nudge">
      <div class="chead"><span class="live"></span><span class="t">Trace</span><span class="s">· watching Revit</span><span class="x" onclick="setState('idle')">&times;</span></div>
      <div class="ntitle">On <b id="ctx">this view</b> — <span id="ncount">…</span></div>
      <div class="rows" id="nrows"></div>
      <div class="actions"><button class="btn" onclick="setState('chat')">Ask Trace</button><button class="btn primary" onclick="setState('idle')">Got it</button></div>
      <div class="allow">🔒 monitoring only: <b>Revit · SketchUp · Office</b> — personal apps ignored</div>
    </div>

    <div class="card hidden" id="chat">
      <div class="chead"><span class="live"></span><span class="t">Trace</span><span class="s">· ask anything</span><span class="x" onclick="setState('idle')">&times;</span></div>
      <div class="projbar"><select id="proj" onchange="switchProject()"></select></div>
      <div class="msgs" id="msgs"><div class="msg from-t">Ask me anything about this project's decisions.</div></div>
      <div class="inbar"><input id="q" placeholder="Ask about this project…" onkeydown="if(event.key==='Enter')send()"/><button class="send" onclick="send()">↑</button></div>
    </div>

    <div class="bubble" onclick="toggleChat()" title="Trace">
      <span class="badge" id="badge">1</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18 C 8 8, 16 8, 20 18"/><circle cx="4" cy="18" r="1.6" fill="currentColor"/><circle cx="20" cy="18" r="1.6" fill="currentColor"/></svg>
    </div>
  </div>

<script>
  const DOT={valid:"g",proposed:"r",superseded:"a"};
  const LABEL={valid:"locked",proposed:"proposed · rejected",superseded:"superseded"};
  function setState(s){
    document.getElementById('nudge').classList.toggle('hidden', s!=='nudge');
    document.getElementById('chat').classList.toggle('hidden', s!=='chat');
    document.getElementById('badge').style.display=(s==='nudge')?'flex':'none';
  }
  function toggleChat(){setState(document.getElementById('chat').classList.contains('hidden')?'chat':'idle');}
  function renderNudge(d){
    document.getElementById('ctx').textContent=d.context||'this view';
    document.getElementById('ncount').textContent=(d.decisions.length)+' decision(s) on record:';
    document.getElementById('nrows').innerHTML=d.decisions.map(x=>
      `<div class="row"><span class="rdot ${DOT[x.status]||'a'}"></span><div><b class="mono">${x.id}</b> ${esc(x.statement)} <span class="k">— ${LABEL[x.status]||x.status}</span></div></div>`).join('');
    setState('nudge');
  }
  function append(cls,html){const m=document.getElementById('msgs');const e=document.createElement('div');e.className='msg '+cls;e.innerHTML=html;m.appendChild(e);m.scrollTop=m.scrollHeight;return e;}
  function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function cite(t){return t.replace(/\((D-\d+)\)/g,'(<span class="cite mono">$1</span>)');}
  function linkify(t){return t.replace(/(https?:\/\/[^\s<)]+)/g,'<a href="$1" target="_blank" rel="noopener" class="cite">$1</a>');}
  function render(t){return linkify(cite(esc(t)));}   // escape FIRST — model/user text never becomes markup
  let PROJECT='';
  function send(){
    const i=document.getElementById('q'),q=i.value.trim();if(!q)return;i.value='';
    append('from-u',esc(q)); const pend=append('from-t','…');
    fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,project:PROJECT})})
      .then(r=>r.json()).then(d=>{pend.innerHTML=render(d.answer);})
      .catch(()=>{pend.innerHTML="(couldn't reach Trace — is the app running?)";});
  }
  function loadState(project){
    fetch('/state'+(project?('?project='+encodeURIComponent(project)):'')).then(r=>r.json()).then(d=>{
      PROJECT=d.project||'';
      const sel=document.getElementById('proj');
      if(d.projects){sel.innerHTML=d.projects.map(p=>`<option value="${p.key}" ${p.key===PROJECT?'selected':''}>${p.title}</option>`).join('');}
      renderNudge(d);
    }).catch(()=>renderNudge({context:"Level 0 · facade",decisions:[
      {id:"D-001",status:"valid",statement:"Facade cladding = non-combustible mineral rainscreen"},
      {id:"D-002",status:"proposed",statement:"Swap to PE-core ACP (combustible)"}]}));
  }
  function switchProject(){
    const key=document.getElementById('proj').value;
    document.getElementById('msgs').innerHTML='<div class="msg from-t">Ask me anything about this project\'s decisions.</div>';
    loadState(key);
    setState('chat');
  }
  // Ambient nudges: poll for document-open events (from the Windows watcher or
  // the workspace page). A new nudge pops the card AND switches the chat's
  // default project to the document's project — the agent follows your work.
  let NUDGE_SEQ = 0;
  function pollNudge(){
    fetch('/nudge-state').then(r=>r.json()).then(n=>{
      if(n.seq && n.seq !== NUDGE_SEQ){
        NUDGE_SEQ = n.seq;
        if(n.project && n.project !== PROJECT){ PROJECT = n.project; loadStateSilent(n.project); }
        renderNudge(n);
      }
    }).catch(()=>{});
  }
  function loadStateSilent(project){
    fetch('/state?project='+encodeURIComponent(project)).then(r=>r.json()).then(d=>{
      PROJECT=d.project||PROJECT;
      const sel=document.getElementById('proj');
      if(d.projects){sel.innerHTML=d.projects.map(p=>`<option value="${p.key}" ${p.key===PROJECT?'selected':''}>${p.title}</option>`).join('');}
    }).catch(()=>{});
  }
  setInterval(pollNudge, 2500);

  // Live from the engine when served by bubble.py; static demo if opened as a bare file.
  loadState('');
</script>
</body>
</html>
