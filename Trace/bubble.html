<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trace</title>
<style>
  /* ── Self-hosted type (offline; served by bubble.py at /fonts). Newsreader 300
     for prose, IBM Plex Mono for the drafting marks. Falls back to system
     serif/mono if opened as a bare file. ──────────────────────────────────── */
  @font-face{font-family:'Newsreader';font-style:normal;font-weight:300;font-display:swap;
    src:url('/fonts/newsreader-latin-300.woff2') format('woff2')}
  @font-face{font-family:'Newsreader';font-style:italic;font-weight:300;font-display:swap;
    src:url('/fonts/newsreader-latin-300-italic.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;
    src:url('/fonts/plexmono-latin-400.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:swap;
    src:url('/fonts/plexmono-latin-600.woff2') format('woff2')}

  :root{
    --serif:'Newsreader',Georgia,'Times New Roman',serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    /* dark glass card — high tint so the record stays legible over white
       drawings, a dark workspace, or any real desktop behind it */
    --tx:#EAEDF3; --tx60:rgba(234,237,243,.62); --tx45:rgba(234,237,243,.46); --tx35:rgba(234,237,243,.34);
    --line:rgba(255,255,255,.10); --line-s:rgba(255,255,255,.20);
    --accent:#8FB4F8; --accent-faint:rgba(143,180,248,.10); --link:#A9C6FA;
    --inforce:#82BD8F; --superseded:#D9AE5F; --rejected:#E08A80;
    --sheet-bg:rgba(15,19,27,.68);
    --sheet-blur:blur(22px) saturate(1.2);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent;color:var(--tx);
    font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow:hidden;
    -webkit-user-select:none;user-select:none}
  /* Opened directly (not as the workspace overlay): give the glass a room to
     sit in — same graphite + soft glow as the workspace, so the judge's first
     visit to "/" looks intentional rather than a card on a bare page. */
  body.standalone{background:
    radial-gradient(52% 44% at 18% -6%, rgba(143,180,248,.10), transparent 68%),
    radial-gradient(44% 40% at 88% 108%, rgba(143,180,248,.06), transparent 70%),
    #101318}


  .stage{position:fixed;z-index:2;width:0;height:0}

  /* the small bubbles that float up when a drop is tapped/dragged */
  .motes{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden}
  .mote{position:absolute;border-radius:50%;opacity:0;
    background:radial-gradient(circle at 35% 30%,#FFFFFF 0%,#DCE9FD 42%,#8FB4F8 100%);
    box-shadow:0 0 6px rgba(143,180,248,.55),inset -1px -1px 2px rgba(60,95,175,.35),inset 1px 1px 2px rgba(255,255,255,.65);
    animation:moteRise var(--dur,2.4s) cubic-bezier(.22,.6,.36,1) forwards}
  @keyframes moteRise{
    0%{opacity:0;transform:translate(0,0) scale(.5)}
    12%{opacity:.95}
    65%{opacity:.6}
    100%{opacity:0;transform:translate(var(--dx,0px),var(--dy,-420px)) scale(1)}
  }

  /* ── the liquid-glass drops (idle) — two independent bubbles, one big one
     small, painted together by a single shared overlay SVG (#liquid) so a
     capillary neck bridges them while close and the small one can fully
     merge into the big one. These elements are just the drag/tap
     hit-targets + label/badge; #liquid paints the actual glass body. ────── */
  .liquid-overlay{position:fixed;inset:0;z-index:2;pointer-events:none}
  .bub{position:fixed;cursor:grab;touch-action:none;transition:opacity .4s ease}
  .bub.dragging{cursor:grabbing;transition:none}
  .bub .label{position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);white-space:nowrap;
    text-align:center;font:600 8px/1 var(--mono);letter-spacing:.26em;color:rgba(150,162,185,.85)}
  .bub .badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;
    background:#B04A3E;color:#fff;font:600 9px/16px var(--mono);text-align:center;
    box-shadow:0 2px 5px rgba(120,60,55,.4)}
  body.open .bub{opacity:0;pointer-events:none}
  .bub.merged{display:none}

  /* ── the glass sheet ────────────────────────────────────────────────────── */
  .sheet{position:absolute;right:0;bottom:104px;width:330px;transform-origin:bottom right;
    transition:opacity .34s cubic-bezier(.32,.72,0,1),transform .34s cubic-bezier(.32,.72,0,1)}
  .sheet.hidden{opacity:0;transform:scale(.95) translateY(10px);pointer-events:none}
  .paper{position:relative;border-radius:18px;background:var(--sheet-bg);
    border:1px solid var(--line-s);
    -webkit-backdrop-filter:var(--sheet-blur);backdrop-filter:var(--sheet-blur);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 0 rgba(255,255,255,.05),
      0 2px 6px rgba(0,0,0,.25),0 22px 48px rgba(0,0,0,.42)}
  .pad{position:relative;padding:22px 24px 24px}

  /* header — the drag handle when the sheet is open (select/x stay clickable) */
  .hdr{display:flex;align-items:center;gap:8px;cursor:grab}
  .hdot{width:12px;height:11px;flex:none;border-radius:52% 48% 50% 50%/56% 46% 58% 42%;
    background:radial-gradient(circle at 34% 28%,#EAF1FE 0%,var(--accent) 55%,#7FA9F7 100%);
    box-shadow:inset -1px -1.5px 2.5px rgba(88,124,200,.45),inset .8px 1px 2px rgba(255,255,255,.7),0 .5px 1.5px rgba(0,0,0,.35)}
  .wordmark{font:600 9.5px/1 var(--mono);letter-spacing:.24em;color:var(--tx60)}
  .hdr .sp{flex:1;min-width:4px}
  select.prj{font:600 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--tx45);
    border:0;background:transparent;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;
    text-align:right;flex:0 1 auto;min-width:0;max-width:128px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  select.prj option{font-family:var(--mono);color:#23262B;background:#fff}
  .x{flex:none;margin-left:8px;font:400 15px/1 var(--serif);color:var(--tx45);cursor:pointer;opacity:.7;transition:opacity .15s}
  .x:hover{opacity:1}
  .x:focus-visible,.chip:focus-visible,.send:focus-visible{outline:1.5px solid var(--accent);outline-offset:2px}

  /* scroll region between header and the ask bar */
  .body{max-height:56vh;overflow-y:auto;overflow-x:hidden;margin:0 -2px;padding:0 2px;
    scrollbar-width:none}
  .body::-webkit-scrollbar{width:0}

  .intro{margin:16px 0 0;font:300 15px/1.55 var(--serif);color:var(--tx)}
  .kicker{margin:18px 0 8px;font:600 8px/1 var(--mono);letter-spacing:.16em;color:var(--tx45)}
  .chips{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
  .chips.wrap{flex-direction:row;flex-wrap:wrap}
  .chip{font:300 13px/1.3 var(--serif);color:var(--tx);text-align:left;cursor:pointer;
    padding:7px 13px 8px;border:1px solid var(--line-s);border-radius:10px;
    background:rgba(255,255,255,.06);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
    transition:border-color .18s ease,background .18s ease,transform .18s ease}
  .chip:hover{border-color:var(--accent);background:var(--accent-faint);transform:translateY(-1px)}

  /* conversation */
  .you{margin:16px 0 0;font:600 8px/1 var(--mono);letter-spacing:.16em;color:var(--tx45)}
  .youq{margin:4px 0 0;font:italic 300 13.5px/1.4 var(--serif);color:var(--tx60)}
  .ans{margin:12px 0 0;font:300 15px/1.55 var(--serif);color:var(--tx);overflow-wrap:anywhere}
  .ans .cite,.cite{font:600 11px/1 var(--mono);color:var(--link);text-decoration:none;
    white-space:nowrap;border-bottom:1px solid rgba(169,198,250,.35)}
  a.cite{white-space:normal}

  /* decision record (the revision schedule) */
  .rec-head{display:flex;justify-content:space-between;align-items:baseline;margin:16px 0 0}
  .rec-head span{font:600 8px/1 var(--mono);letter-spacing:.16em;color:var(--tx45)}
  .rec-body{margin:6px -24px 0;border-top:1px solid var(--line)}
  .rec-row{display:grid;grid-template-columns:7px max-content 1fr 58px;column-gap:9px;
    padding:9px 24px 10px;border-bottom:1px solid var(--line);align-items:start;
    transition:background .15s ease}
  .rec-row:hover{background:rgba(255,255,255,.04)}
  .pdot{width:7px;height:7px;margin-top:5px}
  .rid{font:600 10.5px/1.5 var(--mono);letter-spacing:.06em;color:var(--tx);white-space:nowrap}
  .rst{font:300 13px/1.45 var(--serif);color:var(--tx)}
  .rdt{font:600 9px/1.7 var(--mono);letter-spacing:.03em;color:var(--tx60);text-align:right;white-space:nowrap}
  .legend{display:flex;flex-wrap:wrap;gap:13px;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:5px;font:600 7.5px/1 var(--mono);letter-spacing:.14em;color:var(--tx45)}
  .legend i{width:6px;height:6px;border-radius:51% 49% 53% 47%/49% 54% 46% 51%}

  /* ask bar */
  .ask{display:flex;align-items:center;gap:10px;margin-top:16px}
  .ask input{flex:1;min-width:0;background:transparent;border:0;border-bottom:1px solid var(--line-s);
    border-radius:0;padding:6px 2px 7px;font:300 14px/1.4 var(--serif);color:var(--tx);outline:none;transition:border-color .15s}
  .ask input::placeholder{color:var(--tx35);font-style:italic}
  .ask input:focus{border-bottom-color:var(--accent)}
  .send{flex:none;width:30px;height:27px;border:0;cursor:pointer;padding:0;text-align:center;
    color:#DCE8FD;font:600 12px/27px var(--mono);
    border-radius:50% 50% 46% 54%/56% 50% 52% 44%;
    background:radial-gradient(circle at 38% 30%,rgba(255,255,255,.30) 0%,rgba(170,200,250,.18) 42%,rgba(143,180,248,.26) 78%,rgba(127,169,247,.38) 100%);
    -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.35),inset -2px -3px 5px rgba(40,70,140,.45),inset 2px 3px 5px rgba(255,255,255,.28),0 2px 6px rgba(0,0,0,.3);
    transition:filter .15s,transform .15s}
  .send:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .hide{display:none !important}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
  <!-- hidden defs: liquid-glass drop gradients/filters. The widget is
       transparent and floats over the REAL drawing (workspace PDF / desktop). -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <radialGradient id="dBody" cx="0.62" cy="0.38" r="0.58"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"></stop><stop offset="0.55" stop-color="#DCE9FD" stop-opacity="0.16"></stop><stop offset="0.85" stop-color="#AECBF9" stop-opacity="0.26"></stop><stop offset="1" stop-color="#8FB4F8" stop-opacity="0.4"></stop></radialGradient>
    <filter id="dBlur3" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.6"></feGaussianBlur></filter>
    <filter id="dBlur1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="0.9"></feGaussianBlur></filter>
    <filter id="dBlur6" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5"></feGaussianBlur></filter>
    <linearGradient id="dRim" x1="0" y1="0" x2="0.25" y2="1"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"></stop><stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.12"></stop><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.55"></stop></linearGradient>
  </defs></svg>


  <div class="motes" id="motes"></div>
  <svg class="liquid-overlay" id="liquid" aria-hidden="true"></svg>

  <div class="stage" id="stage">
    <div class="sheet hidden" id="sheet">
      <div class="paper">
        <div class="pad">
          <div class="hdr">
            <span class="hdot"></span><span class="wordmark">TRACE</span><span class="sp"></span>
            <select class="prj" id="proj" onchange="switchProject()" title="Switch project"></select>
            <span class="x" onclick="closeSheet()" title="Close">&times;</span>
          </div>

          <div class="body" id="body">
            <div id="intro">
              <p class="intro">Trace remembers every decision on this drawing — what changed, who called it, and whether it still holds.</p>
              <div class="kicker">ASK THE SHEET</div>
              <div class="chips" id="suggest"></div>
            </div>

            <div id="record" class="hide">
              <div class="rec-head"><span>DECISION RECORD</span><span id="recctx"></span></div>
              <div class="rec-body" id="nrows"></div>
              <div class="legend">
                <span><i style="background:var(--inforce)"></i>IN FORCE</span>
                <span><i style="background:var(--superseded)"></i>SUPERSEDED</span>
                <span><i style="background:var(--rejected)"></i>REJECTED</span>
              </div>
            </div>

            <div id="msgs" class="hide"></div>

            <div id="follow" class="hide">
              <div class="kicker">FOLLOW-UPS</div>
              <div class="chips wrap" id="followchips"></div>
            </div>
          </div>

          <div class="ask">
            <input id="q" placeholder="Ask the sheet…" onkeydown="if(event.key==='Enter')send()"/>
            <button class="send" onclick="send()" title="Ask">&rarr;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bub big" id="bubBig" tabindex="0" role="button" aria-label="Open Trace" title="Trace (drag to move; drop the small bubble on it to merge)">
    <span class="badge hide" id="badge">1</span>
    <div class="label">TRACE</div>
  </div>
  <div class="bub small" id="bubSmall" tabindex="0" aria-label="Trace satellite bubble" title="Drag onto the big bubble to merge"></div>

<script>
  /* ── liquid-glass bubbles: two independently draggable drops (one big, one
     small) sharing a single overlay SVG (#liquid) that paints a live
     capillary neck between them while they're close, and lets the small one
     fully merge into the big one when it's dropped there. The HTML .bub
     elements are only drag/tap hit-targets + the label/badge; #liquid is the
     sole source of the visible glass body, read from their live x/y/r each
     frame — ported from the design's own metaball neck math. ─────────────── */
  (function(){
    var NS="http://www.w3.org/2000/svg";
    function mk(tag,attrs,parent){var el=document.createElementNS(NS,tag);for(var k in attrs)el.setAttribute(k,attrs[k]);parent.appendChild(el);return el;}

    var svg=$("liquid");
    var vdefs=mk("defs",{},svg), clip=mk("clipPath",{id:"liquidClip"},vdefs), clipPath=mk("path",{},clip);
    var shadow=mk("path",{transform:"translate(2.5,5)",fill:"rgba(70,100,170,.17)",filter:"url(#dBlur3)"},svg);
    var body=mk("path",{fill:"url(#dBody)"},svg);
    var g=mk("g",{"clip-path":"url(#liquidClip)"},svg);
    var band=mk("path",{fill:"none",stroke:"rgba(120,155,225,.45)","stroke-width":"9",filter:"url(#dBlur6)"},g);
    var band2=mk("path",{transform:"translate(0,2)",fill:"none",stroke:"rgba(96,132,205,.5)","stroke-width":"3",filter:"url(#dBlur3)"},g);
    var sheen1=mk("ellipse",{fill:"#FFFFFF",opacity:".45",filter:"url(#dBlur3)"},g);
    var sheen2=mk("ellipse",{fill:"#FFFFFF",opacity:".5",filter:"url(#dBlur1)"},g);
    var caustic=mk("ellipse",{fill:"#FFFFFF",opacity:".22",filter:"url(#dBlur3)"},g);
    var spec=mk("ellipse",{fill:"#FFFFFF",opacity:".9",filter:"url(#dBlur1)"},g);
    var edge=mk("path",{fill:"none",stroke:"rgba(105,140,210,.5)","stroke-width":"1"},svg);
    var rim=mk("path",{fill:"none",stroke:"url(#dRim)","stroke-width":"1.4"},svg);

    var reduced=false;
    try{reduced=window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){}

    var big={el:$("bubBig"),r:48,x:0,y:0};
    var small={el:$("bubSmall"),r:21,x:0,y:0,merged:false};

    function easeOutCubic(x){return 1-Math.pow(1-x,3);}
    function lerp(a,b,e){return a+(b-a)*e;}
    function clampNum(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

    function resizeSvg(){svg.setAttribute("width",window.innerWidth);svg.setAttribute("height",window.innerHeight);}
    function place(b){
      b.el.style.width=b.el.style.height=(b.r*2)+"px";
      b.el.style.left=(b.x-b.r)+"px"; b.el.style.top=(b.y-b.r)+"px";
    }
    function clampToViewport(b){
      b.x=clampNum(b.x,b.r,Math.max(b.r,window.innerWidth-b.r));
      b.y=clampNum(b.y,b.r,Math.max(b.r,window.innerHeight-b.r));
    }
    function followBig(){ // the sheet opens relative to wherever the big bubble currently sits
      var stage=$("stage");
      stage.style.left=(big.x+big.r)+"px"; stage.style.top=(big.y+big.r)+"px";
    }
    function initPositions(){ // same corner the single drop used to occupy, small tucked at its lower-left
      big.x=window.innerWidth-26-big.r; big.y=window.innerHeight-24-big.r;
      small.x=big.x-58; small.y=big.y+8;
      clampToViewport(big); clampToViewport(small);
      place(big); place(small); followBig();
    }

    function metaball(r1,r2,c1,c2){
      var dx=c2[0]-c1[0],dy=c2[1]-c1[1],dist=Math.sqrt(dx*dx+dy*dy),maxDist=r1+r2*2.5,v=0.5,handle=2.4;
      if(dist<0.01||dist>maxDist||dist<=Math.abs(r1-r2)+0.5)return null;
      var u1=0,u2=0;
      if(dist<r1+r2){u1=Math.acos((r1*r1+dist*dist-r2*r2)/(2*r1*dist));u2=Math.acos((r2*r2+dist*dist-r1*r1)/(2*r2*dist));}
      var ab=Math.atan2(dy,dx),maxSpread=Math.acos((r1-r2)/dist);
      var a1=ab+u1+(maxSpread-u1)*v,a2=ab-u1-(maxSpread-u1)*v;
      var a3=ab+Math.PI-u2-(Math.PI-u2-maxSpread)*v,a4=ab-Math.PI+u2+(Math.PI-u2-maxSpread)*v;
      var vec=function(c,a,r){return [c[0]+r*Math.cos(a),c[1]+r*Math.sin(a)];};
      var p1=vec(c1,a1,r1),p2=vec(c1,a2,r1),p3=vec(c2,a3,r2),p4=vec(c2,a4,r2);
      var totalR=r1+r2;
      var dBase=Math.min(v*handle,Math.sqrt(Math.pow(p3[0]-p1[0],2)+Math.pow(p3[1]-p1[1],2))/totalR);
      var d2=dBase*Math.min(1,(dist*2)/totalR),hr1=r1*d2,hr2=r2*d2,HALF=Math.PI/2;
      var h1=vec(p1,a1-HALF,hr1),h2=vec(p2,a2+HALF,hr1),h3=vec(p3,a3+HALF,hr2),h4=vec(p4,a4-HALF,hr2);
      var esc=dist>r1?1:0,f=function(n){return n.toFixed(2);},P=function(pt){return f(pt[0])+","+f(pt[1]);};
      return "M"+P(p1)+" C"+P(h1)+" "+P(h3)+" "+P(p3)+" A"+f(r2)+","+f(r2)+" 0 "+esc+",0 "+P(p4)+" C"+P(h4)+" "+P(h2)+" "+P(p2)+" A"+f(r1)+","+f(r1)+" 0 1,0 "+P(p1)+" Z";
    }
    function twoCircles(r1,r2,c1,c2){
      var C=function(c,r){return "M"+(c[0]-r).toFixed(2)+","+c[1].toFixed(2)+" a"+r.toFixed(2)+","+r.toFixed(2)+" 0 1,0 "+(2*r).toFixed(2)+",0 a"+r.toFixed(2)+","+r.toFixed(2)+" 0 1,0 "+(-2*r).toFixed(2)+",0 Z";};
      return C(c1,r1)+" "+C(c2,r2);
    }
    function singleCircle(c,r){
      return "M"+(c[0]-r).toFixed(2)+","+c[1].toFixed(2)+" a"+r.toFixed(2)+","+r.toFixed(2)+" 0 1,0 "+(2*r).toFixed(2)+",0 a"+r.toFixed(2)+","+r.toFixed(2)+" 0 1,0 "+(-2*r).toFixed(2)+",0 Z";
    }

    function render(now){
      var t=now/1000, bob=reduced?0:1.5*Math.sin(t*1.4);
      var r1=big.r+bob*0.5, c1=[big.x,big.y], path;
      var set=function(el,cx,cy,rx,ry,rot){el.setAttribute("cx",cx.toFixed(1));el.setAttribute("cy",cy.toFixed(1));el.setAttribute("rx",rx.toFixed(1));el.setAttribute("ry",ry.toFixed(1));el.setAttribute("transform","rotate("+rot+" "+cx.toFixed(1)+" "+cy.toFixed(1)+")");};
      if(small.merged){
        path=singleCircle(c1,r1);
        sheen2.style.display="none";
      }else{
        var r2=Math.max(0.01,small.r+(reduced?0:0.4*Math.sin(t*1.7+1.1))), c2=[small.x,small.y];
        var dist=Math.hypot(c2[0]-c1[0],c2[1]-c1[1]);
        if(dist>r1+r2*2.5)path=twoCircles(r1,r2,c1,c2);
        else if(dist<=Math.abs(r1-r2)+0.5)path=singleCircle(c1,Math.max(r1,r2));
        else path=metaball(r1,r2,c1,c2)||twoCircles(r1,r2,c1,c2);
        sheen2.style.display="";
        set(sheen2,c2[0],c2[1]-r2*0.55,r2*0.5,r2*0.13,-12);
      }
      var keys=[clipPath,shadow,body,band,band2,edge,rim];
      for(var k=0;k<keys.length;k++)keys[k].setAttribute("d",path);
      set(sheen1,c1[0]-r1*0.06,c1[1]-r1*0.66,r1*0.55,r1*0.085,-7);
      set(spec,c1[0]-r1*0.3,c1[1]-r1*0.74,r1*0.16,r1*0.045,-14);
      set(caustic,c1[0]+r1*0.05,c1[1]+r1*0.74,r1*0.42,r1*0.06,4);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // ── merge: the small bubble is absorbed into the big one (volume adds,
    // roughly, via a quadrature sum) with a short easing tween; the render
    // loop above already knows how to draw every stage of that approach
    // (separate → necked → engulfed), so this only has to move the numbers.
    function mergeBubbles(){
      var b0=big.r, s0=small.r, sx0=small.x, sy0=small.y;
      var targetR=Math.sqrt(b0*b0+s0*s0*1.15);
      var t0=performance.now(), dur=460;
      (function step(now){
        var e=easeOutCubic(clampNum((now-t0)/dur,0,1));
        big.r=lerp(b0,targetR,e);
        small.r=lerp(s0,0,e);
        small.x=lerp(sx0,big.x,e); small.y=lerp(sy0,big.y,e);
        place(big); followBig();
        if(e<1)requestAnimationFrame(step);
        else{small.merged=true; small.el.classList.add("merged"); spawnBubbles();}
      })(t0);
    }

    // ── drag: a plain tap on the big bubble opens the sheet; a real drag on
    // either bubble repositions just that one; dropping the small bubble
    // deep inside the big one triggers the merge above. Dragging the sheet's
    // header (once open) moves the big bubble (and the sheet with it), same
    // as it always has. ──────────────────────────────────────────────────
    var THRESH=4, active=null;
    function beginDrag(b,viaHeader,e){
      if(small.merged&&b===small)return;
      active={b:b,id:e.pointerId,startX:e.clientX,startY:e.clientY,origX:b.x,origY:b.y,moved:false,viaHeader:viaHeader};
      b.el.classList.add("dragging");
      try{e.currentTarget.setPointerCapture(e.pointerId);}catch(err){}
    }
    function onMove(e){
      if(!active||e.pointerId!==active.id)return;
      var dx=e.clientX-active.startX, dy=e.clientY-active.startY;
      if(!active.moved&&Math.hypot(dx,dy)>THRESH)active.moved=true;
      var b=active.b;
      b.x=active.origX+dx; b.y=active.origY+dy;
      clampToViewport(b); place(b);
      if(b===big)followBig();
    }
    function onUp(e){
      if(!active||e.pointerId!==active.id)return;
      var b=active.b, moved=active.moved, viaHeader=active.viaHeader;
      b.el.classList.remove("dragging");
      try{e.currentTarget.releasePointerCapture(e.pointerId);}catch(err){}
      active=null;
      if(!moved){
        if(b===big&&!viaHeader){spawnBubbles();toggleSheet();}
        return;
      }
      if(!small.merged){
        var dist=Math.hypot(small.x-big.x,small.y-big.y);
        if(dist<big.r*0.85)mergeBubbles();
      }
    }
    function attach(el,b,viaHeader){
      el.addEventListener("pointerdown",function(e){
        if(e.target.closest("select,.x,input,.send,.chip"))return;
        beginDrag(b,viaHeader,e);
      });
      el.addEventListener("pointermove",onMove);
      el.addEventListener("pointerup",onUp);
      el.addEventListener("pointercancel",onUp);
    }
    attach(big.el,big,false);
    attach(small.el,small,false);
    attach(document.querySelector(".hdr"),big,true);
    big.el.addEventListener("keydown",function(e){
      if(e.key==="Enter"||e.key===" "){e.preventDefault();spawnBubbles();toggleSheet();}
    });
    window.addEventListener("resize",function(){
      resizeSvg(); clampToViewport(big); clampToViewport(small); place(big); place(small); followBig();
    });

    resizeSvg(); initPositions();

    window.spawnBubbles=function(){
      if(reduced)return;
      var host=$("motes"), r=big.el.getBoundingClientRect();
      var n=6+Math.floor(Math.random()*4);
      for(var i=0;i<n;i++){
        var el=document.createElement("div"); el.className="mote";
        var size=6+Math.random()*15;
        el.style.width=size+"px"; el.style.height=size+"px";
        el.style.left=(r.left+r.width*0.5+(Math.random()*44-22)-size/2)+"px";
        el.style.top=(r.top+r.height*0.32+(Math.random()*20-10)-size/2)+"px";
        el.style.setProperty("--dx",Math.round(Math.random()*100-50)+"px");
        el.style.setProperty("--dy",-Math.round(260+Math.random()*280)+"px");
        el.style.setProperty("--dur",(1.7+Math.random()*1.3).toFixed(2)+"s");
        host.appendChild(el);
        (function(node){setTimeout(function(){node.remove();},3200);})(el);
      }
    };
  })();

  /* ── the widget, wired to the live engine ───────────────────────────────── */
  var DOTC={valid:"var(--inforce)",superseded:"var(--superseded)",rejected:"var(--rejected)",proposed:"var(--rejected)"};
  var RAD=["49% 51% 53% 47%/52% 48% 55% 45%","53% 47% 49% 51%/48% 55% 45% 52%","51% 49% 47% 53%/55% 45% 52% 48%"];
  var SUGGEST=["Why the non-combustible façade cladding?","Can we still switch to the cheaper panel?","Who signed off, and when?"];
  var FOLLOW=["Show me the exact fire-code clause","What’s still open on this project?"];

  var PROJECT="", CONVO=[], CTX=false, DECISIONS=[], RECLABEL="";

  function $(id){return document.getElementById(id);}
  function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function cite(t){return t.replace(/\(((?:\d{6}-)?D-\d+)\)/g,"(<span class=\"cite\">$1</span>)");}
  function linkify(t){return t.replace(/(https?:\/\/[^\s<)]+)/g,"<a href=\"$1\" target=\"_blank\" rel=\"noopener\" class=\"cite\">$1</a>");}
  function render(t){return linkify(cite(esc(t)));}   // escape FIRST — model/user text never becomes markup

  function fillRecord(ds,label){
    DECISIONS=ds||[]; RECLABEL=label||"";
    $("recctx").textContent=RECLABEL;
    $("nrows").innerHTML=DECISIONS.map(function(x,i){
      return '<div class="rec-row">'
        +'<span class="pdot" style="background:'+(DOTC[x.status]||"var(--superseded)")+';border-radius:'+RAD[i%RAD.length]+'"></span>'
        +'<span class="rid">'+esc(x.id)+'</span>'
        +'<span class="rst">'+esc(x.statement)+'</span>'
        +'<span class="rdt">'+esc(x.date||"")+'</span></div>';
    }).join("");
  }
  function renderChips(el,items){
    $(el).innerHTML=items.map(function(q){return '<button class="chip">'+esc(q)+'</button>';}).join("");
    [].forEach.call($(el).children,function(b){b.onclick=function(){$("q").value=b.textContent;send();};});
  }
  function renderMsgs(){
    $("msgs").innerHTML=CONVO.map(function(m){
      return m.role==="user"
        ? '<div class="you">YOU ASKED</div><div class="youq">“'+esc(m.text)+'”</div>'
        : '<p class="ans">'+render(m.text)+'</p>';
    }).join("");
  }
  function layout(){
    var hasMsgs=CONVO.length>0;
    var answered=hasMsgs && CONVO[CONVO.length-1].role==="assistant";
    $("intro").classList.toggle("hide", hasMsgs || CTX);
    $("record").classList.toggle("hide", !CTX);
    $("msgs").classList.toggle("hide", !hasMsgs);
    $("follow").classList.toggle("hide", !answered);
    if(hasMsgs)renderMsgs();
  }

  function openSheet(){document.body.classList.add("open");$("sheet").classList.remove("hidden");$("badge").classList.add("hide");layout();}
  function closeSheet(){document.body.classList.remove("open");$("sheet").classList.add("hidden");}
  function toggleSheet(){$("sheet").classList.contains("hidden")?openSheet():closeSheet();}

  function send(){
    var i=$("q"), q=i.value.trim(); if(!q)return; i.value="";
    CONVO.push({role:"user",text:q});
    CONVO.push({role:"assistant",text:"…"});
    layout(); $("body").scrollTop=$("body").scrollHeight;
    fetch("/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q,project:PROJECT})})
      .then(function(r){return r.json();})
      .then(function(d){
        CONVO[CONVO.length-1]={role:"assistant",text:d.answer};
        CTX=true; fillRecord(DECISIONS,RECLABEL); renderChips("followchips",FOLLOW); layout();
        $("body").scrollTop=$("body").scrollHeight;
      })
      .catch(function(){CONVO[CONVO.length-1]={role:"assistant",text:"(couldn’t reach Trace — is the app running?)"};layout();});
  }

  function applyState(d){
    PROJECT=d.project||PROJECT;
    var sel=$("proj");
    if(d.projects)sel.innerHTML=d.projects.map(function(p){return '<option value="'+p.key+'"'+(p.key===PROJECT?" selected":"")+'>'+esc(p.title)+'</option>';}).join("");
    if(d.decisions){DECISIONS=d.decisions;RECLABEL=(d.context||"").split("·")[0].trim();fillRecord(DECISIONS,RECLABEL);}
  }
  function loadState(project){
    fetch("/state"+(project?("?project="+encodeURIComponent(project)):"")).then(function(r){return r.json();})
      .then(applyState)
      .catch(function(){ // bare-file demo: no engine — seed a static record
        PROJECT="tanglin-rise";
        $("proj").innerHTML='<option>Tanglin Rise · SG · 95 m</option>';
        fillRecord([
          {id:"408213-D-001",status:"valid",statement:"Façade cladding = non-combustible mineral rainscreen",date:"14 JAN 26"},
          {id:"408213-D-002",status:"rejected",statement:"Swap to PE-core ACP (combustible)",date:"03 MAR 26"},
          {id:"408213-D-004",status:"superseded",statement:"Sky-terrace balustrade = laminated glass, 1.1 m",date:"28 JAN 26"}
        ],"Tanglin Rise");
      });
  }
  function switchProject(){
    var key=$("proj").value;
    CONVO=[]; CTX=false;
    loadState(key); openSheet();
  }

  /* ambient nudges: the watcher / workspace posts a document-open event; the
     sheet pops with that drawing's record and the agent follows your work */
  var NUDGE_SEQ=0;
  function pollNudge(){
    fetch("/nudge-state").then(function(r){return r.json();}).then(function(n){
      if(n.seq && n.seq!==NUDGE_SEQ){
        NUDGE_SEQ=n.seq;
        if(n.project && n.project!==PROJECT){PROJECT=n.project;CONVO=[];loadStateSilent(n.project);}
        fillRecord(n.decisions||[], (n.context||"").split("—")[0].trim());
        CTX=true;
        openSheet();   // ambient: Trace surfaces itself, unprompted, when you open a drawing
      }
    }).catch(function(){});
  }
  function loadStateSilent(project){
    fetch("/state?project="+encodeURIComponent(project)).then(function(r){return r.json();}).then(function(d){
      PROJECT=d.project||PROJECT;
      var sel=$("proj");
      if(d.projects)sel.innerHTML=d.projects.map(function(p){return '<option value="'+p.key+'"'+(p.key===PROJECT?" selected":"")+'>'+esc(p.title)+'</option>';}).join("");
    }).catch(function(){});
  }
  setInterval(pollNudge,2500);

  try{if(window===window.top)document.body.classList.add("standalone");}catch(e){}
  renderChips("suggest",SUGGEST);
  loadState("");
</script>
</body>
</html>
