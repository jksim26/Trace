<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trace — workspace (simulated)</title>
<style>
  /* Self-hosted type (served by bubble.py at /fonts) — Newsreader for prose,
     IBM Plex Mono for sheet numbers and labels. No external requests. */
  @font-face{font-family:'Newsreader';font-style:normal;font-weight:300;font-display:swap;
    src:url('/fonts/newsreader-latin-300.woff2') format('woff2')}
  @font-face{font-family:'Newsreader';font-style:italic;font-weight:300;font-display:swap;
    src:url('/fonts/newsreader-latin-300-italic.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;
    src:url('/fonts/plexmono-latin-400.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:swap;
    src:url('/fonts/plexmono-latin-600.woff2') format('woff2')}

  :root{
    --serif:'Newsreader',Georgia,'Times New Roman',serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    /* deep graphite base — the dark native PDF chrome now belongs to the room
       instead of fighting it */
    --base:#101318; --base-2:#14181F;
    --tx:#E9ECF2; --tx60:rgba(233,236,242,.60); --tx40:rgba(233,236,242,.40); --tx28:rgba(233,236,242,.28);
    --glass:rgba(255,255,255,.055); --glass-hi:rgba(255,255,255,.09);
    --edge:rgba(255,255,255,.11); --edge-s:rgba(255,255,255,.17);
    --accent:#8FB4F8; --accent-dim:rgba(143,180,248,.14);
    --rejected:#D98177;
    --shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 24px 60px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{position:relative;display:flex;flex-direction:column;background:var(--base);color:var(--tx);
    font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow:hidden}

  /* atmosphere: two soft glows + a faint drafting grid, all far below content */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;
    background:
      radial-gradient(52% 44% at 18% -6%, rgba(143,180,248,.10), transparent 68%),
      radial-gradient(44% 40% at 88% 108%, rgba(143,180,248,.06), transparent 70%)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;
    background:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px) 0 0/100% 44px,
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px) 0 0/44px 100%}

  /* ── top bar: one floating glass strip ─────────────────────────────────── */
  .bar{position:relative;z-index:3;display:flex;align-items:baseline;gap:16px;
    margin:14px 16px 0;padding:14px 22px;border-radius:14px;
    background:var(--glass);border:1px solid var(--edge);
    -webkit-backdrop-filter:blur(18px) saturate(1.15);backdrop-filter:blur(18px) saturate(1.15);
    box-shadow:var(--shadow)}
  .bar .proj{font:300 18px/1 var(--serif);letter-spacing:.01em;white-space:nowrap}
  .bar .meta{font:600 8px/1 var(--mono);letter-spacing:.2em;color:var(--tx40);white-space:nowrap}
  .stamp{font:600 8px/1 var(--mono);letter-spacing:.16em;color:var(--rejected);
    border:1px solid rgba(217,129,119,.55);border-radius:3px;padding:4px 8px;opacity:.85;white-space:nowrap}
  .bar .sp{flex:1;min-width:12px}
  .bar .note{font:italic 300 11.5px/1.5 var(--serif);color:var(--tx40);max-width:380px;text-align:right}
  .bar .note code{font:400 10.5px/1 var(--mono);color:var(--tx40)}

  .main{flex:1;display:flex;gap:16px;min-height:0;position:relative;z-index:2;padding:14px 16px 16px}

  /* ── drawing register: a glass panel, sheet numbers as the anchor ──────── */
  .files{width:248px;flex:none;display:flex;flex-direction:column;border-radius:14px;
    background:var(--glass);border:1px solid var(--edge);
    -webkit-backdrop-filter:blur(18px) saturate(1.15);backdrop-filter:blur(18px) saturate(1.15);
    box-shadow:var(--shadow);overflow:hidden}
  .files h2{font:600 8px/1 var(--mono);letter-spacing:.22em;color:var(--tx40);padding:18px 18px 12px}
  .reg{flex:1;overflow-y:auto;border-top:1px solid var(--edge);scrollbar-width:none}
  .reg::-webkit-scrollbar{width:0}
  .doc{display:grid;grid-template-columns:44px 1fr;column-gap:10px;align-items:baseline;
    width:100%;padding:12px 18px;border:0;border-bottom:1px solid rgba(255,255,255,.06);
    background:transparent;text-align:left;font-family:inherit;color:inherit;cursor:pointer;
    transition:background .18s ease}
  .doc:hover{background:var(--glass-hi)}
  .doc.open{background:var(--accent-dim);box-shadow:inset 2px 0 0 var(--accent)}
  .doc .no{font:600 10px/1.6 var(--mono);letter-spacing:.02em;color:var(--tx40)}
  .doc.open .no{color:var(--accent)}
  .doc .ti{font:300 13.5px/1.45 var(--serif);color:var(--tx)}

  /* ── the viewer: a glass frame; the browser's dark PDF chrome blends in ── */
  .viewer{flex:1;position:relative;border-radius:14px;overflow:hidden;
    background:var(--base-2);border:1px solid var(--edge);box-shadow:var(--shadow)}
  .viewer iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;
    animation:fadein .45s ease}
  .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
  .empty p{font:300 15.5px/1.8 var(--serif);color:var(--tx40)}
  .empty b{display:block;font-style:italic;font-weight:300;font-size:19px;color:var(--tx60);margin-bottom:6px}
  .empty code{font:400 11.5px/1 var(--mono);color:var(--tx40)}

  .bubbleframe{position:fixed;right:0;bottom:0;width:430px;height:660px;border:none;background:transparent;z-index:50}

  /* entrance: quiet, staggered */
  .bar,.files,.viewer{animation:rise .5s cubic-bezier(.22,.72,.1,1) both}
  .files{animation-delay:.06s}.viewer{animation-delay:.12s}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}

  :focus-visible{outline:1.5px solid var(--accent);outline-offset:2px}

  @media (max-width:760px){
    .bar .note{display:none}
    .main{flex-direction:column}
    .files{width:100%;max-height:38vh}
    .bubbleframe{width:100vw;max-width:430px}
  }
  @media (prefers-reduced-motion:reduce){
    *,.bar,.files,.viewer{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
  <div class="bar">
    <span class="proj">Tanglin Rise</span>
    <span class="meta">PROJECT WORKSPACE</span>
    <span class="stamp">SIMULATED</span>
    <span class="sp"></span>
    <span class="note">Demo drawings — Trace's reactions are live, through the same matcher <code>ambient.py</code> uses on a real desktop.</span>
  </div>
  <div class="main">
    <div class="files">
      <h2>DRAWING REGISTER</h2>
      <div class="reg" id="docs"></div>
    </div>
    <div class="viewer" id="viewer">
      <div class="empty" id="emptyState">
        <p><b>Open a drawing.</b>Trace is watching — the way <code>watcher.py</code><br>would watch it on your own desktop.</p>
      </div>
    </div>
  </div>
  <iframe class="bubbleframe" src="/" title="Trace"></iframe>

<script>
  // Sheet numbers follow real drawing-set convention (discipline letter + series)
  // so the register reads as an index, not a decorated list.
  const DOCS = [
    {no:"A-101", title:"Tanglin Rise — L01 Fire Plan",            file:"Tanglin-Rise_L01_Fire-Plan.pdf"},
    {no:"A-120", title:"Tanglin Rise — L20 Sky Terrace",           file:"Tanglin-Rise_L20_Sky-Terrace.pdf"},
    {no:"E-001", title:"Kranji Hub — GF Switchboard Layout",       file:"Kranji-Hub_GF_Switchboard-Layout.pdf"},
    {no:"A-210", title:"Maple Wharf — East Elevation",             file:"Maple-Wharf_East-Elevation.pdf"},
  ];
  const list = document.getElementById('docs');
  list.innerHTML = DOCS.map(d =>
    `<button class="doc" data-f="${d.file}" onclick="openDoc('${d.file}',this)">` +
      `<span class="no">${d.no}</span><span class="ti">${d.title}</span>` +
    `</button>`
  ).join('');

  function openDoc(file, el){
    document.querySelectorAll('.doc').forEach(x => x.classList.remove('open'));
    el.classList.add('open');
    document.getElementById('viewer').innerHTML =
      `<iframe src="/drawings/${encodeURIComponent(file)}" title="${file}"></iframe>`;
    // The document-open event — the same signal watcher.py sends from a real
    // desktop. Trace's reaction (matcher -> live store -> nudge) is identical.
    fetch('/nudge', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title: file})}).catch(() => {});
  }
</script>
</body>
</html>
