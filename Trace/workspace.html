<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trace — workspace (simulated)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;color:#20242e}
  body{display:flex;flex-direction:column;background:#eef0f4}

  .bar{display:flex;align-items:center;gap:12px;padding:9px 16px;background:#fff;border-bottom:1px solid #dfe2ea}
  .bar b{font-size:13px;letter-spacing:.01em}
  .bar .sim{font-size:10.5px;font-weight:650;letter-spacing:.08em;color:#3b62c4;
    background:rgba(110,158,247,.13);border:1px solid #6e9ef7;border-radius:99px;padding:3px 10px}
  .bar .note{font-size:11px;color:#7b8299;margin-left:auto}

  .main{flex:1;display:flex;min-height:0}
  .files{width:250px;background:#f7f8fb;border-right:1px solid #dfe2ea;padding:12px;overflow:auto}
  .files h2{font-size:10px;font-weight:700;letter-spacing:.12em;color:#8a90a4;margin:4px 4px 8px}
  .doc{display:flex;gap:9px;align-items:center;padding:9px 10px;border-radius:9px;cursor:pointer;
    font-size:12px;line-height:1.35;border:1px solid transparent}
  .doc:hover{background:#eef2fb}
  .doc.open{background:#e8eefc;border-color:#c9d8f8}
  .doc svg{flex:none;width:15px;height:15px;stroke:#e05c72}
  .viewer{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
  .viewer iframe{width:100%;height:100%;border:none;background:#fff}
  .empty{color:#8a90a4;font-size:13px;text-align:center;line-height:1.7}
  .bubbleframe{position:fixed;right:0;bottom:0;width:430px;height:660px;border:none;background:transparent;z-index:50}
</style>
</head>
<body>
  <div class="bar">
    <b>Tanglin Rise — project workspace</b>
    <span class="sim">SIMULATED WORKSPACE</span>
    <span class="note">the drawings are demo files · everything Trace does is live (same matcher as the desktop watcher — Trace/ambient.py)</span>
  </div>
  <div class="main">
    <div class="files">
      <h2>PROJECT DRAWINGS</h2>
      <div id="docs"></div>
    </div>
    <div class="viewer" id="viewer">
      <div class="empty">Open a drawing.<br>Trace is watching — the way it would watch<br>your real desktop with <code>watcher.py</code>.</div>
    </div>
  </div>
  <iframe class="bubbleframe" src="/" title="Trace"></iframe>

<script>
  const DOCS = [
    "Tanglin-Rise_L01_Fire-Plan.pdf",
    "Tanglin-Rise_L20_Sky-Terrace.pdf",
    "Kranji-Hub_GF_Switchboard-Layout.pdf",
    "Maple-Wharf_East-Elevation.pdf",
  ];
  const PDFICON = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`;
  const list = document.getElementById('docs');
  list.innerHTML = DOCS.map(d=>`<div class="doc" data-f="${d}" onclick="openDoc('${d}',this)">${PDFICON}<span>${d}</span></div>`).join('');

  function openDoc(file, el){
    document.querySelectorAll('.doc').forEach(x=>x.classList.remove('open'));
    el.classList.add('open');
    document.getElementById('viewer').innerHTML =
      `<iframe src="/drawings/${encodeURIComponent(file)}" title="${file}"></iframe>`;
    // The document-open event — the same signal watcher.py sends from a real
    // desktop. Trace's reaction (matcher -> live store -> nudge) is identical.
    fetch('/nudge',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:file})}).catch(()=>{});
  }
</script>
</body>
</html>
