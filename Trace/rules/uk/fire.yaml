# Trace rule-pack — England (UK) external-wall constraints.
#
# A SEPARATE jurisdiction pack: rules/ loads only its own top-level *.yaml by
# default (the Singapore SCDF pack); load this one explicitly with
# load_rules("rules/uk") for a UK project. Same engine, different code —
# rule-packs are pluggable per jurisdiction.
#
# Source: the post-Grenfell combustible-materials ban — Building Regulations
# 2010 reg 7(2) (as amended 2018): external walls of a "relevant building"
# (residential, over 18 m) must achieve European Class A2-s1,d0 or better.

- id: UK-Reg7-2-combustible-ban
  citation: "Building Regulations 2010 reg 7(2) (amended 2018)"
  rationale: "External wall materials of a relevant residential building over 18 m must be European Class A2-s1,d0 or better — combustible cladding is banned."
  provision: "Materials which become part of an external wall, or specified attachment, of a relevant building shall be of European Classification A2-s1,d0 or A1. (curated from reg 7(2))"
  url: "https://www.legislation.gov.uk/uksi/2010/2214/regulation/7"
  when:
    building.height_m: {gt: 18}
  require:
    facade.cladding.combustible: {eq: false}
  blast_radius:
    - "Gateway 2 building-control approval"
    - "the golden-thread record (BSA 2022)"
    - "facade support and fixings"
    - "EWS1 / lender sign-off"
